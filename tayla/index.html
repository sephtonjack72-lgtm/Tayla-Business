<!DOCTYPE html>
<html>
<head>
  <title>Tayla Finance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial; margin:0; background:#0b1f2a; color:#fff; }
    .nav { display:flex; gap:20px; padding:15px; background:#07151d; border-bottom:1px solid #1e3a4a; }
    .tab { cursor:pointer; padding:6px 12px; border-radius:6px; }
    .tab:hover { background:#0f2c3a; }
    .page { display:none; padding:20px; }
    .active { display:block; }
    .card { background:#0f2c3a; padding:20px; border-radius:10px; max-width:700px; margin-bottom:20px; }
    input, select { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none; }
    button { padding:10px; width:100%; border:none; border-radius:6px; background:#1e88e5; color:white; cursor:pointer; }
    button:hover { background:#1565c0; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { padding:10px; border-bottom:1px solid #1e3a4a; text-align:left; }
    th { background:#07151d; }
  </style>
</head>
<body>
<div class="nav">
  <div class="tab" onclick="showPage('transactions')">Transactions</div>
  <div class="tab" onclick="showPage('journal')">Journal</div>
  <div class="tab" onclick="showPage('ledger')">Ledger</div>
  <div class="tab" onclick="showPage('balance')">Balance Sheet</div>
  <div class="tab" onclick="showPage('gst')">GST / BAS</div>
</div>
<div id="transactions" class="page active">
  <div class="card">
    <h2>Add Transaction</h2>
    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <select id="type">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
    </select>
    <select id="gst">
      <option value="yes">GST Included</option>
      <option value="no">No GST</option>
    </select>
    <button onclick="addTransaction()">Add Transaction</button>
  </div>
</div>
<div id="journal" class="page">
  <div class="card">
    <h2>General Journal</h2>
    <input id="filterAccount" placeholder="Filter by account" oninput="renderJournal()">
    <table>
      <thead>
        <tr><th>Date</th><th>Description</th><th>Account</th><th>Debit</th><th>Credit</th></tr>
      </thead>
      <tbody id="journal-body"></tbody>
    </table>
  </div>
</div>
<div id="ledger" class="page">
  <div class="card">
    <h2>Ledger</h2>
    <div id="ledger-body"></div>
  </div>
</div>
<div id="balance" class="page">
  <div class="card">
    <h2>Balance Sheet</h2>
    <div id="balance-body"></div>
  </div>
</div>
<div id="gst" class="page">
  <div class="card">
    <h2>GST / BAS Summary</h2>
    <div id="gst-body"></div>
  </div>
</div>
<script>
let transactions = JSON.parse(localStorage.getItem('transactions')||'[]');
let journals = JSON.parse(localStorage.getItem('journals')||'[]');

function uid(){ return Math.random().toString(36).substring(2); }
function save(){ localStorage.setItem('transactions', JSON.stringify(transactions)); }
function saveJournals(){ localStorage.setItem('journals', JSON.stringify(journals)); }

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  renderAll();
}

// Smart categorisation
function autoCategory(desc){
  desc = desc.toLowerCase();
  if(desc.includes('fuel')) return 'Fuel';
  if(desc.includes('ads')||desc.includes('marketing')) return 'Advertising';
  if(desc.includes('bulldozer')||desc.includes('equipment')) return 'Plant & Equipment';
  return 'General Expense';
}

function isAssetPurchase(desc){
  return autoCategory(desc)==='Plant & Equipment';
}

function createJournal(tx){
  const entries=[];
  const gst = tx.gst==='yes' ? +(tx.amount/11).toFixed(2) : 0;
  const ex = tx.amount - gst;

  if(tx.type==='expense'){
    const acc = isAssetPurchase(tx.desc)?'Plant & Equipment':autoCategory(tx.desc);
    entries.push({account:acc, debit:ex, credit:0});
    if(gst>0) entries.push({account:'GST Receivable', debit:gst, credit:0});
    entries.push({account:'Bank', credit:tx.amount, debit:0});
  }

  if(tx.type==='income'){
    entries.push({account:'Bank', debit:tx.amount, credit:0});
    if(gst>0) entries.push({account:'GST Payable', credit:gst, debit:0});
    entries.push({account:'Revenue', credit:ex, debit:0});
  }

  return { id:uid(), date:new Date().toISOString().split('T')[0], desc:tx.desc, entries };
}

function addTransaction(){
  const desc=document.getElementById('desc').value;
  const amount=+document.getElementById('amount').value;
  const type=document.getElementById('type').value;
  const gst=document.getElementById('gst').value;

  if(!desc||!amount) return alert('Fill fields');

  const tx={id:uid(), desc, amount, type, gst};
  transactions.unshift(tx);

  const journal=createJournal(tx);
  journals.unshift(journal);

  save(); saveJournals();
  renderAll();
}

// Journal
function renderJournal(){
  const filter=document.getElementById('filterAccount').value.toLowerCase();
  const tbody=document.getElementById('journal-body');
  tbody.innerHTML='';

  journals.forEach(j=>{
    j.entries.forEach((e,i)=>{
      if(filter && !e.account.toLowerCase().includes(filter)) return;
      tbody.innerHTML+=`<tr>
        <td>${i===0?j.date:''}</td>
        <td>${i===0?j.desc:''}</td>
        <td>${e.account}</td>
        <td>${e.debit||''}</td>
        <td>${e.credit||''}</td>
      </tr>`;
    });
  });
}

// Ledger
function renderLedger(){
  const ledger={};
  journals.forEach(j=>{
    j.entries.forEach(e=>{
      if(!ledger[e.account]) ledger[e.account]=0;
      ledger[e.account]+= (e.debit||0)-(e.credit||0);
    });
  });

  document.getElementById('ledger-body').innerHTML =
    Object.entries(ledger).map(([k,v])=>`<p>${k}: ${v.toFixed(2)}</p>`).join('');
}

// Balance Sheet
function renderBalance(){
  let assets=0, liabilities=0;

  journals.forEach(j=>{
    j.entries.forEach(e=>{
      const val=(e.debit||0)-(e.credit||0);
      if(e.account.includes('Bank')||e.account.includes('Equipment')||e.account.includes('Receivable')) assets+=val;
      if(e.account.includes('Payable')) liabilities+=-val;
    });
  });

  document.getElementById('balance-body').innerHTML = `
    <p>Assets: ${assets.toFixed(2)}</p>
    <p>Liabilities: ${liabilities.toFixed(2)}</p>
    <p>Equity: ${(assets-liabilities).toFixed(2)}</p>
  `;
}

// 🔥 GST / BAS (FIXED PROPERLY)
function renderGST(){
  let gstCollected=0; // 1A
  let gstPaid=0;      // 1B

  journals.forEach(j=>{
    j.entries.forEach(e=>{
      if(e.account==='GST Payable') gstCollected += e.credit||0;
      if(e.account==='GST Receivable') gstPaid += e.debit||0;
    });
  });

  const payable = gstCollected - gstPaid;

  document.getElementById('gst-body').innerHTML = `
    <p><strong>GST on Sales (1A):</strong> ${gstCollected.toFixed(2)}</p>
    <p><strong>GST on Purchases (1B):</strong> ${gstPaid.toFixed(2)}</p>
    <hr>
    <p><strong>Net GST:</strong> ${payable.toFixed(2)}</p>
    <p>${payable > 0 ? 'You owe the ATO' : 'ATO owes you'}</p>
  `;
}

function renderAll(){
  renderJournal();
  renderLedger();
  renderBalance();
  renderGST();
}

renderAll();
</script>
</body>
</html>
